<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="TO_dNV4lqnDJPUgTT3UliLE07GKq0s6bsqVNSWqKy2Y" />
    <meta name="description" content="Grand Taxi Eilat — מחירון ללא תחרות. מוניות באילת, הסעות לשדה התעופה רמון וים המלח. התקשרו עכשיו!">
<meta name="keywords" content="מוניות באילת, טקסי אילת, מונית רמון, taxi eilat, такси эйлат, трансфер рамон">
<meta name="author" content="Grand Taxi Eilat">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Taxi Eilat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Prata&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0A1931; /* Глубокий королевский синий */
            --accent-color: #C5A059; /* Золото как на рамке */
            --slogan-color: #E2C799; /* Теплое песочное золото для слогана */
            --text-color: #e0e0e0;
            --card-bg: #102444; /* Чуть светлее */
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            line-height: 1.6;
        }

        /* Красивый шрифт Prata для заголовков и слогана */
        h1, h2, h3, #subtitle {
            font-family: 'Prata', serif !important;
            font-weight: 400;
        }

        .lang-switcher {
            background-color: #000;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-bottom: 2px solid var(--accent-color);
            direction: ltr; /* Переключатель языков всегда слева направо для удобства */
        }

        .lang-btn {
            background: none;
            border: none;
            color: #777;
            font-size: 0.9em;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 5px;
            transition: all 0.2s;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
        }

        .lang-btn.active {
            color: #000;
            background-color: var(--accent-color);
        }

        header {
            padding: 40px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Логотип */
        .logo-img {
            max-width: 280px;
            height: auto;
            margin-bottom: 15px;
            display: block;
        }

        /* Стиль для вашего нового слогана */
        #subtitle {
            margin: 10px 0 0;
            font-size: 1.3em;
            color: var(--slogan-color);
            letter-spacing: 1px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0 40px;
            align-items: center;
        }

        .cta-button {
            display: inline-block;
            width: 85%;
            max-width: 350px;
            color: #000; /* Черный текст на золоте */
            padding: 16px 20px;
            font-size: 1.1em;
            font-weight: 900;
            text-decoration: none;
            border-radius: 50px;
            background-color: var(--accent-color);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
        }

        .btn-call::before { content: '📞 '; }
        .btn-whatsapp::before { content: '💬 '; }

        .features {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .feature-card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            text-align: right; /* По умолчанию выравнивание для иврита */
            border: 1px solid rgba(197, 160, 89, 0.2); 
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-1px);
        }

        /* Если переключили на русский/английский */
        body.ltr .feature-card {
            text-align: left;
        }

        .feature-card h3 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1.5em;
            display: flex;
            align-items: center;
        }
        
        .feature-card h3 .icon {
            font-size: 1.3em;
            margin-left: 15px; /* Отступ слева для иврита */
        }
        
        body.ltr .feature-card h3 .icon {
            margin-left: 0;
            margin-right: 15px;
        }

        .feature-card p {
            margin: 10px 0 0;
            font-size: 0.95em;
            color: var(--text-color);
            opacity: 0.8;
            font-weight: 300;
        }

        footer {
            margin-top: 50px;
            padding: 25px 20px;
            font-size: 0.85em;
            color: #777;
            border-top: 2px solid var(--accent-color);
            font-weight: 300;
        }
    </style>
</head>
<body class="rtl"> <div class="lang-switcher">
        <button class="lang-btn" id="btn-ru" onclick="setLanguage('ru')">Рус</button>
        <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">Eng</button>
        <button class="lang-btn active" id="btn-he" onclick="setLanguage('he')">עבר</button>
    </div>

    <header>
        <img src="logo.png" alt="Grand Taxi Eilat" class="logo-img">
        <p id="subtitle">נוחות. דיוק. אמינות.</p>
    </header>

    <div class="container">
        
        <div class="buttons-container">
            <a href="tel:+972542257878" class="cta-button btn-call" id="btn-call">התקשר לנהг</a>
            
            <a href="https://wa.me/972542257878?text=%D0%97%D0%B4%D1%80%D0%B0%D0%B2%D1%81%D1%82%D0%B2%D1%83%D0%B9%D1%82%D0%B5!%20%D0%AF%20%D1%85%D0%BE%D1%87%D1%83%20%D0%B7%D0%B0%D0%BA%D0%B0%D0%B7%D0%B0%D1%82%D1%8C%20%D1%82%D0%B0%D0%BA%D1%81%D0%B8." class="cta-button btn-whatsapp" id="btn-wa" target="_blank">שלח הודעה בוואטסאפ</a>
        </div>

        <div class="features">
            <div class="feature-card">
                <h3 id="feat1-title"><span class="icon">✈️</span>הסעות לנמל התעופה רמון</h3>
                <p id="feat1-desc">נגיע בזמן иניקח אתכם בנוחות מירבית ישירות לטרמינל.</p>
            </div>
            <div class="feature-card">
                <h3 id="feat2-title"><span class="icon">🌊</span>נסיעות לים המלח</h3>
                <p id="feat2-desc">נסיעות מפנקות לחופשה בלתי נשכחת.</p>
            </div>
            <div class="feature-card">
                <h3 id="feat3-title"><span class="icon">🏙️</span>נסיעות בעיר ובסביבה</h3>
                <p id="feat3-desc">הגעה מהירה של הרכב, שירות אדיב ויחס אישי.</p>
            </div>
        </div>

    </div>

    <footer>
        <p id="footer-text">&copy; 2026 Grand Taxi Eilat. כל הזכויות שמורות.</p>
    </footer>

    <script>
        const translations = {
            he: {
                subtitle: "נוחות. דיוק. אמינות.",
                btnCall: "התקשר לנהג",
                btnWa: "שלח הודעה בוואטסאפ",
                feat1Title: "הסעות לנמל התעופה רמון",
                feat1Desc: "נגיע בזמן וניקח אתכם בנוחות מירבית ישירות לטרמינל.",
                feat2Title: "נסיעות לים המלח",
                feat2Desc: "נסיעות מפנקות לחופשה בלתי נשכחת.",
                feat3Title: "נסיעות בעיר ובסביבה",
                feat3Desc: "הגעה מהירה של הרכב, שירות אדיב ויחס אישי.",
                footer: "&copy; 2026 Grand Taxi Eilat. כל הזכויות שמורות."
            },
            ru: {
                subtitle: "Комфорт. Точность. Надежность.",
                btnCall: "Позвонить водителю",
                btnWa: "Написать в WhatsApp",
                feat1Title: "Трансфер в аэропорт Рамон",
                feat1Desc: "Встретим вовремя и доставим с комфортом прямо к терминалу.",
                feat2Title: "Поездки на Мертвое море",
                feat2Desc: "Комфортабельные поездки для вашего незабываемого отдыха.",
                feat3Title: "По городу и окрестностям",
                feat3Desc: "Быстрая подача машины и вежливое обслуживание.",
                footer: "&copy; 2026 Grand Taxi Eilat. Все права защищены."
            },
            en: {
                subtitle: "Comfort. Precision. Reliability.",
                btnCall: "Call Driver",
                btnWa: "Message on WhatsApp",
                feat1Title: "Ramon Airport Transfer",
                feat1Desc: "We will meet you on time and deliver you comfortably to the terminal.",
                feat2Title: "Dead Sea Trips",
                feat2Desc: "Comfortable trips for your unforgettable vacation.",
                feat3Title: "City & Local Rides",
                feat3Desc: "Fast car arrival and polite service.",
                footer: "&copy; 2026 Grand Taxi Eilat. All rights reserved."
            }
        };

        function setLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            
            if (lang === 'he') {
                document.getElementById('btn-he').classList.add('active');
                document.body.classList.remove('ltr');
                document.body.classList.add('rtl');
                document.documentElement.setAttribute('dir', 'rtl');
                document.documentElement.setAttribute('lang', 'he');
            } else {
                if (lang === 'ru') document.getElementById('btn-ru').classList.add('active');
                if (lang === 'en') document.getElementById('btn-en').classList.add('active');
                
                document.body.classList.remove('rtl');
                document.body.classList.add('ltr');
                document.documentElement.setAttribute('dir', 'ltr');
                document.documentElement.setAttribute('lang', lang);
            }

            document.getElementById('subtitle').innerText = translations[lang].subtitle;
            document.getElementById('btn-call').innerText = translations[lang].btnCall;
            document.getElementById('btn-wa').innerText = translations[lang].btnWa;
            
            document.getElementById('feat1-title').innerHTML = `<span class="icon">✈️</span>${translations[lang].feat1Title}`;
            document.getElementById('feat1-desc').innerText = translations[lang].feat1Desc;
            document.getElementById('feat2-title').innerHTML = `<span class="icon">🌊</span>${translations[lang].feat2Title}`;
            document.getElementById('feat2-desc').innerText = translations[lang].feat2Desc;
            document.getElementById('feat3-title').innerHTML = `<span class="icon">🏙️</span>${translations[lang].feat3Title}`;
            document.getElementById('feat3-desc').innerText = translations[lang].feat3Desc;
            document.getElementById('footer-text').innerHTML = translations[lang].footer;
        }

        // Принудительно вызываем установку иврита при первой загрузке
        window.onload = function() {
            setLanguage('he');
        };
    </script>
</body>
</html>
